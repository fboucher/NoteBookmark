name: keycloak-dlvhome

services:
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.5.4
    restart: always
    # ports:
    #   - "8443:8443"
    #   - "8280:8080"
    volumes:
      - "./data/certs:/etc/x509/https:ro" 
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_URL}

      KC_PROXY_ADDRESS_FORWARDING: "true"
      KC_DB_URL: jdbc:postgresql://keycloak_postgres:5432/keycloak
      KC_DB: postgres
      KC_DB_USERNAME:  ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTPS_CERTIFICATE_FILE: /etc/x509/https/dlvhome.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /etc/x509/https/dlvhome.key
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: debug
      KC_FEATURES: "token-exchange"


    labels:
      - traefik.enable=true
      - traefik.http.routers.keycloak-http.rule=Host(`keycloak.c5m.ca`)
      - traefik.http.routers.keycloak-http.entrypoints=web

    depends_on:
      - keycloak_postgres
    networks:
      - proxy 
    command:
      - 'start'

  keycloak_postgres:
    container_name: keycloak_postgres
    image: postgres:14.18
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy 


networks:
  proxy:
    external: true
  # keycloak-network:
  #   name: keycloak-network
  #   driver: bridge

volumes:
  postgres_data:
