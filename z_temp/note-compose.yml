name: 2note-bookmark

services:
  api:
    image: "fboucher/notebookmark-api:alpha-latest"
    container_name: "2notebookmark-api"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8000"
      ConnectionStrings__nb-tables: "${NB_STORAGE_OUTPUTS_TABLEENDPOINT}"
      ConnectionStrings__nb-blobs: "${NB_STORAGE_OUTPUTS_BLOBENDPOINT}"
    ports:
      - "8001:8000"
      - "8003:8002"
    restart: unless-stopped
    networks:
      - "proxy"

      
  blazor-app:
    image: "fboucher/notebookmark-blazor:alpha-latest"
    container_name: "2notebookmark-blazor"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8004"
      services__api__http__0: "http://api:8000"
      REKA_API_KEY: "${REKA_API_KEY}"
      ConnectionStrings__nb-tables: "${NB_STORAGE_OUTPUTS_TABLEENDPOINT}"
      ConnectionStrings__nb-blobs: "${NB_STORAGE_OUTPUTS_BLOBENDPOINT}"
      services__keycloak__http__0: "http://keycloak:8080"
      Keycloak__Authority: "${KEYCLOAK_AUTHORITY}"
      Keycloak__ClientId: "${KEYCLOAK_CLIENT_ID}"
      Keycloak__ClientSecret: "${KEYCLOAK_CLIENT_SECRET}"
    volumes:
      - ./dataprotection-keys:/root/.aspnet/DataProtection-Keys
    labels:
      - traefik.enable=true
      - traefik.http.routers.notebookmark.rule=Host(`nb.c5m.ca`)
      - traefik.http.routers.notebookmark.entrypoints=web
      - traefik.http.routers.notebookmark.middlewares=nb-https-headers
      - traefik.http.middlewares.nb-https-headers.headers.customrequestheaders.X-Forwarded-Proto=https
    depends_on:
      api:
        condition: "service_started"
    restart: unless-stopped
    networks:
      - "proxy"

networks:
  proxy:
    external: true
